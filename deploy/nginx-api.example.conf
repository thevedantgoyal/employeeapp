# Example: reverse-proxy /api to the Node backend (default PORT 4000).
# Copy snippets into your server block and adjust upstream host/port to match
# backend PORT and ecosystem.config.cjs.
#
# Trailing slash on proxy_pass strips /api prefix when forwarding to the app
# mounted at /api — see docs/DEPLOYMENT.md §6.

upstream employeeapp_api {
    server 127.0.0.1:4000;
}

server {
    listen 80;
    server_name _;

    # SPA static files (adjust root to your frontend build output)
    # root /var/www/employeeapp/dist;
    # location / {
    #     try_files $uri $uri/ /index.html;
    # }

    location /api/ {
        proxy_pass http://employeeapp_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
